# ============================================================
# Allure Report Configuration — {AIRLINE_NAME} UI Automation
# ============================================================
# Replace {JIRA_URL} and {TMS_URL} with your organization's actual URLs.
# See skills/airline-domain/SKILL.md for the AIRLINE CONFIGURATION table.

# Results directory (relative to project root)
allure.results.directory=allure-results

# Deep links to JIRA and TestLink — configure for your airline
# Example: https://jira.yourcompany.com/browse/{} — replace with real JIRA URL
allure.link.issue.pattern={JIRA_URL}/browse/{}
# Example: https://testlink.yourcompany.com/case/{} — replace with real TMS URL
allure.link.tms.pattern={TMS_URL}/case/{}

# Report title
allure.report.name={AIRLINE_NAME} UI Automation Report
