# ============================================================
# {AIRLINE_NAME} UI Automation — Test Configuration
# ============================================================
# All values are externalized here. Never hardcode in source.
# Override individual properties via -Dproperty.name=value
# ============================================================

# Application
# Set BASE_URL via environment variable or replace this value with the target airline's URL
base.url=${BASE_URL}
environment=staging

# Browser
browser=chrome
headless=false
browser.window.maximize=true
browser.disable.notifications=true

# Timeouts (seconds)
timeout.implicit=0
timeout.explicit=15
timeout.page.load=30
# Spinner timeout — adjust based on observed airline SLA (default 30s is safe for most airlines)
timeout.spinner=30
timeout.fluent.polling=500

# Screenshots
screenshot.on.failure=true
screenshot.path=allure-results/screenshots

# Test Data
test.user.email=${TEST_USER_EMAIL}
test.user.password=${TEST_USER_PASSWORD}
test.pnr=${TEST_PNR}

# Allure
allure.results.dir=allure-results

# Retry (for flaky tests)
retry.count=0
