[pytest]
# Allure results directory
addopts = --alluredir=allure-results -v --tb=short

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers (register custom markers)
markers =
    smoke: Smoke tests — critical path validation
    booking: Booking flow tests
    checkin: Check-in flow tests
    payment: Payment flow tests
    manage: Manage Booking tests
    ancillaries: Ancillary tests
    edge_case: Edge case and boundary tests
    flaky: Known flaky tests requiring retry

# Logging
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s %(levelname)s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
